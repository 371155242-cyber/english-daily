<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>每日英语</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:16px;-webkit-tap-highlight-color:transparent}
.header{text-align:center;padding:20px 0 10px}
.header h1{font-size:24px;margin-bottom:4px}
.header .streak{font-size:14px;color:#94a3b8}
.tabs{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap}
.tab{flex:1;min-width:60px;padding:10px 6px;text-align:center;border-radius:10px;background:#1e293b;color:#94a3b8;border:none;font-size:13px;cursor:pointer;transition:all .15s}
.tab.active{background:#3b82f6;color:#fff;font-weight:600}
.card{background:#1e293b;border-radius:16px;padding:24px;margin:12px 0;text-align:center;min-height:180px;display:flex;flex-direction:column;justify-content:center}
.card .en{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:10px;line-height:1.4}
.card .zh{font-size:18px;color:#94a3b8;margin-bottom:6px}
.card .tip{font-size:13px;color:#64748b;margin-top:6px;padding:6px 10px;background:#0f172a;border-radius:6px}
.card .num{font-size:13px;color:#475569;margin-bottom:10px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin:6px 0;transition:all .12s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:#3b82f6;color:#fff}
.btn-done{background:#10b981;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-ghost{background:#334155;color:#e2e8f0}
.progress-bar{height:4px;background:#1e293b;border-radius:2px;margin:10px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:#3b82f6;transition:width .3s}
.stats{display:flex;gap:10px;margin:10px 0}
.stat{flex:1;text-align:center;background:#1e293b;border-radius:12px;padding:14px}
.stat .num{font-size:26px;font-weight:700;color:#f1f5f9}
.stat .label{font-size:12px;color:#94a3b8;margin-top:3px}
.quiz-answer{display:none}
.quiz-answer.show{display:block}
.empty{text-align:center;padding:40px 20px;color:#64748b;font-size:16px;line-height:1.8}
.hidden{display:none}
#swAlert{display:none;background:#f59e0b;color:#000;text-align:center;padding:10px;font-size:14px;cursor:pointer;border-radius:8px;margin-bottom:8px}
input[type=text]{width:100%;padding:12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:16px;margin-bottom:8px;outline:none}
input[type=text]:focus{border-color:#3b82f6}
</style>
</head>
<body>

<div id="swAlert" onclick="window.location.reload()">🔄 有新内容！点这里更新</div>

<div class="header">
  <h1>📖 每日英语</h1>
  <div class="streak" id="streakText">🔥 连续 0 天</div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="learn">📚 学习</button>
  <button class="tab" data-tab="quiz">📝 测验</button>
  <button class="tab" data-tab="progress">📊 进度</button>
  <button class="tab" data-tab="add">✏️ 添加</button>
</div>

<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<div id="learnCard" class="card">
  <div class="num" id="learnNum"></div>
  <div class="en" id="learnEn"></div>
  <div class="zh" id="learnZh" style="display:none"></div>
  <div class="tip" id="learnTip" style="display:none"></div>
  <button class="btn btn-primary" id="learnBtn">👆 点击看中文</button>
  <button class="btn btn-done hidden" id="nextBtn">✅ 记住了，下一句</button>
</div>

<div id="learnDone" class="empty hidden">
  <p style="font-size:40px">🎉</p>
  <p>今天的学习完成！</p>
  <button class="btn btn-primary" id="retryQuiz" style="margin-top:12px">去测验复习</button>
</div>

<div id="quizArea" class="hidden">
  <div class="card">
    <div class="num" id="quizNum"></div>
    <div class="zh" id="quizZh"></div>
    <div class="quiz-answer" id="quizAnswer">
      <div class="en" style="margin-top:12px" id="quizEn"></div>
      <div class="tip" id="quizTip"></div>
    </div>
    <button class="btn btn-primary" id="showBtn">👆 看答案</button>
    <div class="hidden" id="quizBtns" style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-done" id="quizOkBtn">✅ 对了</button>
      <button class="btn btn-danger" id="quizFailBtn">❌ 错了</button>
    </div>
  </div>
</div>

<div id="progressArea" class="hidden">
  <div class="stats">
    <div class="stat"><div class="num" id="totalLearned">0</div><div class="label">已学句子</div></div>
    <div class="stat"><div class="num" id="totalAll">110</div><div class="label">总计</div></div>
  </div>
  <div style="margin-top:12px" id="wordList"></div>
  <button class="btn btn-ghost" id="resetBtn" style="margin-top:12px">🔄 重新开始</button>
</div>

<div id="addArea" class="hidden">
  <div class="card">
    <div style="font-size:18px;font-weight:600;margin-bottom:12px">✏️ 添加自己的句子</div>
    <input type="text" id="addEn" placeholder="英文句子">
    <input type="text" id="addZh" placeholder="中文翻译">
    <input type="text" id="addTip" placeholder="记忆技巧（选填）">
    <button class="btn btn-primary" id="addBtn">✅ 添加到词库</button>
  </div>
  <div id="addMsg" style="text-align:center;color:#10b981;font-size:15px;margin-top:6px"></div>
</div>

function getAllWords() {
  var words = [];
  Object.keys(UNITS).forEach(function(unit) {
    UNITS[unit].forEach(function(item) {
      words.push({en:item.en, zh:item.zh, tip:item.tip, unit:unit});
    });
  });
  var custom = JSON.parse(localStorage.getItem('en_custom') || '[]');
  custom.forEach(function(item) {
    words.push({en:item.en, zh:item.zh, tip:item.tip||'', unit:'自定义'});
  });
  return words;
}

var allWords = getAllWords();

var learned = JSON.parse(localStorage.getItem('en_learned') || '[]');
var streak = parseInt(localStorage.getItem('en_streak') || '0');
var lastStudy = localStorage.getItem('en_last') || '';
var dailyPool = [];
var currentCard = 0;
var cardFlipped = false;
var quizWords = [];
var quizIndex = 0;
var quizScore = 0;

function saveData() {
  localStorage.setItem('en_learned', JSON.stringify(learned));
  localStorage.setItem('en_streak', streak);
  localStorage.setItem('en_last', lastStudy);
}
function isLearned(en) { return learned.indexOf(en) >= 0; }

function updateStreak() {
  var today = new Date().toDateString();
  if (lastStudy === today) return;
  var y = new Date(); y.setDate(y.getDate()-1);
  streak = (lastStudy === y.toDateString()) ? streak+1 : 1;
  lastStudy = today;
  saveData();
}

// Learn
function prepareLearn() {
  var unlearned = getAllWords().filter(function(w){ return !isLearned(w.en); });
  if (unlearned.length === 0) unlearned = getAllWords();
  unlearned.sort(function(){ return Math.random()-0.5; });
  dailyPool = unlearned.slice(0,5);
  currentCard = 0;
  cardFlipped = false;
  updateStreak();
}
function showCard() {
  var el = document.getElementById('learnCard');
  var done = document.getElementById('learnDone');
  if (currentCard >= dailyPool.length) {
    el.classList.add('hidden');
    done.classList.remove('hidden');
    updateAll();
    return;
  }
  el.classList.remove('hidden');
  done.classList.add('hidden');
  var w = dailyPool[currentCard];
  document.getElementById('learnNum').textContent = (currentCard+1)+' / '+dailyPool.length;
  document.getElementById('learnEn').textContent = w.en;
  document.getElementById('learnZh').textContent = w.zh;
  document.getElementById('learnZh').style.display = 'none';
  document.getElementById('learnTip').textContent = '💡 '+w.tip;
  document.getElementById('learnTip').style.display = 'none';
  document.getElementById('learnBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  cardFlipped = false;
}
function flipCard() {
  document.getElementById('learnZh').style.display = 'block';
  document.getElementById('learnTip').style.display = 'block';
  document.getElementById('learnBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  cardFlipped = true;
}
function nextCard() {
  var w = dailyPool[currentCard];
  if (!isLearned(w.en)) { learned.push(w.en); saveData(); }
  currentCard++;
  showCard();
  updateAll();
}

// Quiz
function prepareQuiz() {
  quizWords = getAllWords().filter(function(w){ return isLearned(w.en); });
  if (quizWords.length === 0) quizWords = getAllWords();
  quizWords.sort(function(){ return Math.random()-0.5; });
  quizWords = quizWords.slice(0,10);
  quizIndex = 0;
  quizScore = 0;
}
function showQuiz() {
  if (quizIndex >= quizWords.length) {
    var emoji = quizScore >= 8 ? '🔥' : (quizScore >= 5 ? '💪' : '📖');
    document.getElementById('quizArea').innerHTML =
      '<div class="empty"><p style="font-size:40px">'+emoji+'</p><p>测验完成！</p><p style="font-size:26px;font-weight:700">'+quizScore+' / '+quizWords.length+'</p><button class="btn btn-primary" id="retryQuizBtn" style="margin-top:12px">再来一次</button></div>';
    document.getElementById('retryQuizBtn').addEventListener('click',function(){
      prepareQuiz(); showQuiz();
    });
    updateAll();
    return;
  }
  var w = quizWords[quizIndex];
  document.getElementById('quizNum').textContent = (quizIndex+1)+' / '+quizWords.length;
  document.getElementById('quizZh').textContent = w.zh;
  document.getElementById('quizEn').textContent = w.en;
  document.getElementById('quizTip').textContent = '💡 '+w.tip;
  document.getElementById('quizAnswer').classList.remove('show');
  document.getElementById('showBtn').classList.remove('hidden');
  document.getElementById('quizBtns').classList.add('hidden');
}
function showAnswerFn() {
  document.getElementById('quizAnswer').classList.add('show');
  document.getElementById('showBtn').classList.add('hidden');
  document.getElementById('quizBtns').classList.remove('hidden');
}
function quizResult(correct) {
  if (correct) quizScore++;
  quizIndex++;
  showQuiz();
}

// Add
function addCustomSentence() {
  var en = document.getElementById('addEn').value.trim();
  var zh = document.getElementById('addZh').value.trim();
  var tip = document.getElementById('addTip').value.trim();
  if (!en || !zh) { document.getElementById('addMsg').textContent = '英文和中文都要填！'; return; }
  var custom = JSON.parse(localStorage.getItem('en_custom') || '[]');
  custom.push({en:en, zh:zh, tip:tip||''});
  localStorage.setItem('en_custom', JSON.stringify(custom));
  allWords = getAllWords();
  document.getElementById('addEn').value = '';
  document.getElementById('addZh').value = '';
  document.getElementById('addTip').value = '';
  document.getElementById('addMsg').textContent = '✅ 已添加！';
  document.getElementById('totalAll').textContent = allWords.length;
  setTimeout(function(){ document.getElementById('addMsg').textContent = ''; }, 2000);
}

// Progress
function updateAll() {
  var total = getAllWords().length;
  document.getElementById('totalLearned').textContent = learned.length;
  document.getElementById('totalAll').textContent = total;
  document.getElementById('streakText').textContent = '🔥 连续 '+streak+' 天';
  document.getElementById('progressFill').style.width = total>0?(learned.length/total*100)+'%':'0%';
}
function resetProgress() {
  if (!confirm('确定重新开始？')) return;
  learned = []; streak = 0; lastStudy = ''; saveData();
  prepareLearn(); showCard(); prepareQuiz(); updateAll(); showWordList();
}
function showWordList() {
  var html = '';
  var groups = {};
  getAllWords().forEach(function(w) {
    if (!groups[w.unit]) groups[w.unit] = [];
    groups[w.unit].push(w);
  });
  Object.keys(groups).forEach(function(unit) {
    var items = groups[unit];
    var cnt = items.filter(function(w){ return isLearned(w.en); }).length;
    html += '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:14px;font-weight:600;padding:4px 0">'+unit+' <span style="color:#94a3b8;font-weight:400">'+cnt+'/'+items.length+'</span></div>';
    items.forEach(function(w) {
      html += '<div style="display:flex;align-items:center;padding:4px 6px;margin:1px 0;background:#1e293b;border-radius:6px;font-size:13px"><span style="margin-right:6px">'+(isLearned(w.en)?'✅':'⬜')+'</span>'+w.en+'</div>';
    });
    html += '</div>';
  });
  document.getElementById('wordList').innerHTML = html;
}

// Tabs
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  for (var i=0; i<tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) tabs[i].classList.add('active');
  }
  document.getElementById('learnCard').classList.add('hidden');
  document.getElementById('learnDone').classList.add('hidden');
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('progressArea').classList.add('hidden');
  document.getElementById('addArea').classList.add('hidden');
  if (tab === 'learn') { prepareLearn(); showCard(); }
  else if (tab === 'quiz') { document.getElementById('quizArea').classList.remove('hidden'); prepareQuiz(); showQuiz(); }
  else if (tab === 'progress') { document.getElementById('progressArea').classList.remove('hidden'); updateAll(); showWordList(); }
  else if (tab === 'add') { document.getElementById('addArea').classList.remove('hidden'); document.getElementById('totalAll').textContent = getAllWords().length; }
}

// Bind events
document.getElementById('learnBtn').addEventListener('click', flipCard);
document.getElementById('nextBtn').addEventListener('click', nextCard);
document.getElementById('showBtn').addEventListener('click', showAnswerFn);
document.getElementById('quizOkBtn').addEventListener('click', function(){ quizResult(true); });
document.getElementById('quizFailBtn').addEventListener('click', function(){ quizResult(false); });
document.getElementById('addBtn').addEventListener('click', addCustomSentence);
document.getElementById('resetBtn').addEventListener('click', resetProgress);
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(e){ switchTab(e.target.getAttribute('data-tab')); });
});

// SW
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/english-daily/sw.js').then(function(reg){
    reg.onupdatefound = function(){
      var w = reg.installing;
      w.onstatechange = function(){
        if (w.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('swAlert').style.display = 'block';
        }
      };
    };
  });
}

// Init
prepareLearn();
showCard();
prepareQuiz();
updateAll();
showWordList();
})();
</script>
</body>
